<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sbírka na Projekt X</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .progress-container { background: #e0e0e0; border-radius: 20px; height: 30px; width: 100%; margin: 20px 0; overflow: hidden; position: relative; }
        /* TADY NASTAVUJEŠ PROCENTA - zmeň width v následujícím řádku */
        .progress-bar { background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%); height: 100%; width: 25%; transition: width 0.5s ease-in-out; }
        .stats { font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .qr-section { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px dashed #ccc; }
        .btn-paypal { display: inline-block; background-color: #0070ba; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/3mS7Xh90/1000026850.png" alt="Cíl sbírky">
    
    <h1>Sbírka na Projekt X</h1>
    <p>Pomoz mi dosáhnout cíle! Každá koruna se počítá.</p>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    
    <div class="stats">
        Vybráno: 300 Kč / Cíl: 1 200 Kč (25 %)
    </div>

    <div class="qr-section">
        <p><strong>Jak přispět:</strong></p>
        <p>Pošli peníze na PayPal:</p>
        <a href="https://www.paypal.me/TVOJE_JMENO" class="btn-paypal">Přispět přes PayPal</a>
        <p style="font-size: 12px; margin-top: 10px; color: #666;">Nebo naskenuj QR kód ve své bance (pokud ho tam vložíš).</p>
    </div>
</div>

</body>
</html>
