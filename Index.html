<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt X | Oficiální sbírka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            color: var(--text);
        }

        .card {
            background: var(--card);
            max-width: 450px;
            width: 90%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .image-container {
            width: 100%;
            height: 250px;
            background: #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 30px;
        }

        .badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        h1 { font-size: 24px; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 25px; }

        /* Progress Bar Area */
        .progress-section { margin-bottom: 25px; }
        
        .progress-container { 
            background: #f1f5f9; 
            border-radius: 10px; 
            height: 12px; 
            width: 100%; 
            overflow: hidden;
        }

        .progress-bar { 
            background: var(--primary); 
            height: 100%; 
            width: 30%; /* TADY NASTAVUJEŠ PROCENTA */
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        .stats { 
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
        }

        .stats b { font-size: 18px; color: var(--text); }

        /* Payment Buttons */
        .cta-button {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .cta-button:hover { background: var(--primary-dark); }

        .secondary-info {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/3mS7Xh90/1000026850.png" alt="Projekt náhled">
    </div>

    <div class="content">
        <span class="badge">Aktivní sbírka</span>
        <h1>Podpora Projektu X</h1>
        <p>Tato sbírka slouží k financování pořízení konkrétního vybavení. Každý příspěvek nás posouvá blíž k cíli.</p>

        <div class="progress-section">
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div class="stats">
                <div><b>360 Kč</b><br><small>vybráno</small></div>
                <div style="text-align: right;"><b>1 200 Kč</b><br><small>cíl (30 %)</small></div>
            </div>
        </div>

        <a href="https://www.paypal.me/TVOJE_JMENO" class="cta-button">Podpořit přes PayPal</a>
        
        <div class="secondary-info">
            Bezpečné zpracování plateb. V případě dotazů mě kontaktujte.
        </div>
    </div>
</div>

<script>
    // Malý trik, aby se bar po načtení animoval
    window.onload = function() {
        document.getElementById('bar').style.width = '30%'; // SEM DEJ STEJNÉ % JAKO V CSS
    };
</script>

</body>
</html>
